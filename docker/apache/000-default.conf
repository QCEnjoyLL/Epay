<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.php index.html

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^([A-Za-z0-9_-]+)\.html$ /index.php?mod=$1 [L,QSA]
        RewriteRule ^pay/(.*)$ /pay.php?s=$1 [L,QSA]
        RewriteRule ^api/(.*)$ /api.php?s=$1 [L,QSA]
        RewriteRule ^doc/([A-Za-z0-9_-]+)\.html$ /index.php?doc=$1 [L,QSA]
    </Directory>

    <Directory /var/www/html/includes>
        Require all denied
    </Directory>

    <Directory /var/www/html/plugins>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
