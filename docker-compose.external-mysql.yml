services:
  app:
    image: ${EPAY_IMAGE:-orangeqiu/epay:latest}
    ports:
      - "${APP_PORT:-8080}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${MYSQL_DATABASE:-epay}
      DB_USER: ${MYSQL_USER:-epay}
      DB_PASSWORD: ${MYSQL_PASSWORD:-change_this_epay_password}
      DB_PREFIX: ${EPAY_DB_PREFIX:-pay}
      EPAY_AUTO_INSTALL: ${EPAY_AUTO_INSTALL:-1}
      EPAY_INSTALL_LOCK: 1
    restart: unless-stopped
