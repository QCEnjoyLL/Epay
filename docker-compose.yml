services:
  app:
    image: ${EPAY_IMAGE:-orangeqiu/epay:latest}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-epay}
      DB_USER: ${MYSQL_USER:-epay}
      DB_PASSWORD: ${MYSQL_PASSWORD:-epay_password}
      DB_PREFIX: ${EPAY_DB_PREFIX:-pay}
      EPAY_AUTO_INSTALL: 1
      EPAY_INSTALL_LOCK: 1
    restart: unless-stopped

  db:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-epay}
      MYSQL_USER: ${MYSQL_USER:-epay}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-epay_password}
    volumes:
      - epay-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  epay-db:
